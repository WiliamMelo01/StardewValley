<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Valley Coop-code</title>
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>

    <script src="./scripts/index.js" type="module" ></script>

    <div class="container">
        <div class="title">
            <img src="/assets/images/junimo.png" class="junimo-icon" alt="Stardew Valley green junimo">
            <h1>código de acesso da fazenda</h1>
            <img src="/assets/images/junimo.png" class="junimo-icon" alt="Stardew Valley green junimo">
        </div>

        <div class="code-container">
            <input type="text" value="----------" class="code-input" maxlength="12" minlength="12" readonly>
            <img src="./assets/images/papyrus.png" alt="Papyrus" class="papyrus">
            
            <button class="reload">
                <img src="./assets/images/reload.png" width="45" height="45" alt="">
            </button>
        </div>

        <div class="buttons-container">

            <button class="copy-button action-button">
                <img src="./assets/images/copy.png" width="45" height="45" alt="">
                <span>COPIAR CÓDIGO</span>
            </button>

            <button class="edit-button action-button">
                <img src="./assets/images/pencil.png" width="30" height="30" alt="">
                <span>EDITAR CÓDIGO</span>
            </button>
        </div>

        <div class="message">
        </div>

    </div>
</body>
</html>
